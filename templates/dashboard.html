{% extends "base.html" %}

{% block content %}
<div class="container-fluid animate-up">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <h1 class="fw-bold mb-0">Workspace <span class="text-gradient">Overview</span></h1>
            <p class="text-muted">Welcome back, {{ current_user.username }}! Here's what's happening today.</p>
        </div>
        <div class="d-flex gap-3">
            <a href="{{ url_for('tasks.export_tasks') }}" class="btn btn-outline-secondary rounded-pill px-4">
                <i class="bi bi-download me-2"></i> Export Data
            </a>
            <button class="btn btn-primary px-4" data-bs-toggle="modal" data-bs-target="#addTaskModal">
                <i class="bi bi-plus-lg me-2"></i> Create Task
            </button>
        </div>
    </div>

    <!-- Stats Cards -->
    <div class="row g-4 mb-5">
        <div class="col-md-3">
            <div class="dashboard-card">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <p class="text-muted small mb-0">Total Tasks</p>
                    <i class="bi bi-layers text-primary"></i>
                </div>
                <h2 class="fw-bold mb-0" id="totalTasks">0</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="dashboard-card">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <p class="text-muted small mb-0">Completed</p>
                    <i class="bi bi-check2-circle text-success"></i>
                </div>
                <h2 class="fw-bold mb-0" id="completedTasks">0</h2>
                <div class="progress mt-3">
                    <div id="completionBar" class="progress-bar" role="progressbar" style="width: 0%"></div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="dashboard-card">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <p class="text-muted small mb-0">Pending</p>
                    <i class="bi bi-clock text-warning"></i>
                </div>
                <h2 class="fw-bold mb-0" id="pendingTasks">0</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="dashboard-card">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <p class="text-muted small mb-0">Performance</p>
                    <i class="bi bi-lightning-charge text-info"></i>
                </div>
                <h2 class="fw-bold mb-0" id="completionPct">0%</h2>
            </div>
        </div>
    </div>

    <!-- Filters & Table -->
    <div class="dashboard-card border-0 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold mb-0">Task List</h5>
            <div class="d-flex gap-2">
                <input type="text" id="searchTask" class="form-control" placeholder="Search tasks..." oninput="renderTasks()">
                <select id="filterPriority" class="form-select" onchange="renderTasks()">
                    <option value="All">All Priority</option>
                    <option value="High">High</option>
                    <option value="Medium">Medium</option>
                    <option value="Low">Low</option>
                </select>
            </div>
        </div>
        <div id="taskContainer">
            <!-- Table rendered by main.js -->
        </div>
    </div>
</div>

<!-- Add Task Modal -->
<div class="modal fade" id="addTaskModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content dashboard-card border-secondary">
            <div class="modal-header border-bottom border-secondary">
                <h5 class="modal-title fw-bold">New Task</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addTaskForm" class="needs-validation" novalidate>
                    <div class="form-floating mb-3">
                        <input type="text" id="taskTitle" class="form-control" placeholder="Task Title" required>
                        <label for="taskTitle">Task Title</label>
                        <div class="invalid-feedback">Title is required.</div>
                    </div>
                    <div class="form-floating mb-3">
                        <textarea id="taskDesc" class="form-control" placeholder="Description" style="height: 100px"></textarea>
                        <label for="taskDesc">Description</label>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <div class="form-floating">
                                <select id="taskPriority" class="form-select">
                                    <option value="Low">Low</option>
                                    <option value="Medium" selected>Medium</option>
                                    <option value="High">High</option>
                                </select>
                                <label for="taskPriority">Priority</label>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <div class="form-floating">
                                <input type="date" id="taskDueDate" class="form-control" placeholder="Due Date">
                                <label for="taskDueDate">Due Date</label>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 mt-3">Create Task</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Edit Task Modal -->
<div class="modal fade" id="editTaskModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content dashboard-card border-secondary">
            <div class="modal-header border-bottom border-secondary">
                <h5 class="modal-title fw-bold">Edit Task</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="editTaskForm" class="needs-validation" novalidate>
                    <input type="hidden" id="editTaskId">
                    <div class="form-floating mb-3">
                        <input type="text" id="editTaskTitle" class="form-control" placeholder="Task Title" required>
                        <label for="editTaskTitle">Task Title</label>
                        <div class="invalid-feedback">Title is required.</div>
                    </div>
                    <div class="form-floating mb-3">
                        <textarea id="editTaskDesc" class="form-control" placeholder="Description" style="height: 100px"></textarea>
                        <label for="editTaskDesc">Description</label>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <div class="form-floating">
                                <select id="editTaskPriority" class="form-select">
                                    <option value="Low">Low</option>
                                    <option value="Medium">Medium</option>
                                    <option value="High">High</option>
                                </select>
                                <label for="editTaskPriority">Priority</label>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <div class="form-floating">
                                <select id="editTaskStatus" class="form-select">
                                    <option value="Pending">Pending</option>
                                    <option value="Completed">Completed</option>
                                </select>
                                <label for="editTaskStatus">Status</label>
                            </div>
                        </div>
                        <div class="col-md-12 mb-3">
                            <div class="form-floating">
                                <input type="date" id="editTaskDueDate" class="form-control" placeholder="Due Date">
                                <label for="editTaskDueDate">Due Date</label>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 mt-3">Save Changes</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
